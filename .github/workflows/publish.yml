name: publish

# master に push されたタイミングで差分テストを実行し、
# package.json の version がまだ npm に存在しない場合のみ公開する。
# 認証は OIDC（npm Trusted Publishing）。NPM_TOKEN シークレットは不要。
on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC トークン発行（Trusted Publishing / provenance）
    steps:
      - uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm (Trusted Publishing に対応した版へ)
        run: npm install -g npm@latest

      - name: Set up Python (差分テストの基準 CPython)
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Run differential tests
        run: node tests/run_tests.js

      - name: Check whether this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already published: $NAME@$VERSION"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "new version: $NAME@$VERSION"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # OIDC により認証されるため NODE_AUTH_TOKEN は不要。
      # provenance は Trusted Publishing で自動付与される。
      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public
