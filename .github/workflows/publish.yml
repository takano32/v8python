name: publish

# master に push されたタイミングで差分テストを実行し、
# package.json の version がまだ npm に存在しない場合のみ公開する。
on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # npm provenance 用
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Python (差分テストの基準 CPython)
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Run differential tests
        run: node tests/run_tests.js

      - name: Check whether this version is already published
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "already published: $NAME@$VERSION"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "new version: $NAME@$VERSION"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
